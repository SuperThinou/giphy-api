<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random GIF Finder</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <h1>RANDOM VAPORWAVE GIF</h1>
    <div class="search-bar-container">
        <div class="search-bar">
            <img src="assets/search.svg" alt="" class="icon" />
            <input type="search" id="searchBar" placeholder="Custom search" />
        </div>
        <div class="gif-container">
            <div class="loader hidden"></div>
            <img src="#" id="gif">
        </div>
        <div class="btn-container">
            <button id="randomGifBtn" class="random-gif-btn">NEW GIF</button>
            <select name="mode" id="mode" class="mode">
                <option value="vaporwave" class="option-vaporwave">VAPORWAVE</option>
                <option value="simpson" class="option-simpson">SIMPSON</option>
                <option value="random" class="option-random">RANDOM</option>
            </select>
        </div>

        <footer data-drag-id="footer">
            <p>NBX 2026 ©</p>
            <a href="https://github.com/SuperThinou" target="_blank"><img src="assets/github-mark-white.svg"
                    alt="Github logo" class="github-logo" /></a>
        </footer>
</body>

</html>
